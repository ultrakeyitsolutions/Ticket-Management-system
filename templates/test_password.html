<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Setting Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Test Password Setting API</h2>
        
        <div class="mb-3">
            <label for="userId" class="form-label">User ID:</label>
            <input type="number" id="userId" class="form-control" value="1">
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label">New Password:</label>
            <input type="password" id="password" class="form-control" value="test123">
        </div>
        
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm Password:</label>
            <input type="password" id="confirmPassword" class="form-control" value="test123">
        </div>
        
        <button onclick="testPasswordSet()" class="btn btn-primary">Test Set Password</button>
        
        <div id="result" class="mt-3"></div>
    </div>

    <script>
        // Helper function to get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function showToast(message, type = "info") {
            const toast = document.createElement("div");
            toast.className = `alert alert-${type} alert-dismissible fade show`;
            toast.setAttribute("role", "alert");
            toast.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;

            document.body.insertBefore(toast, document.body.firstChild);

            setTimeout(() => {
                toast.remove();
            }, 5000);
        }

        async function testPasswordSet() {
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resultDiv = document.getElementById('result');

            if (!userId || !password || !confirmPassword) {
                showToast('Please fill in all fields', 'danger');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'danger');
                return;
            }

            const csrf = getCookie('csrftoken');
            const url = `/api/users/${userId}/set-password/`;

            console.log('Testing password set API...');
            console.log('URL:', url);
            console.log('CSRF Token:', csrf);

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrf || '',
                    },
                    body: JSON.stringify({
                        password: password,
                        confirm_password: confirmPassword
                    }),
                });

                console.log('Response status:', res.status);
                const data = await res.json();
                console.log('Response data:', data);

                if (!res.ok) {
                    throw new Error(data.detail || 'Failed to set password');
                }

                resultDiv.innerHTML = `
                    <div class="alert alert-success">
                        <h5>Success!</h5>
                        <p>Password set successfully for user ${data.username}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;

                showToast(`Password set successfully for ${data.username}`, 'success');

            } catch (err) {
                console.error('Error setting password:', err);
                resultDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h5>Error!</h5>
                        <p>${err.message}</p>
                        <pre>${err.stack}</pre>
                    </div>
                `;
                showToast('Failed to set password: ' + (err.message || 'Unknown error'), 'danger');
            }
        }

        // Load users on page load
        async function loadUsers() {
            try {
                const res = await fetch('/api/agents/');
                if (res.ok) {
                    const data = await res.json();
                    console.log('Available users:', data.results);
                    
                    const userIdSelect = document.getElementById('userId');
                    data.results.forEach(user => {
                        const option = document.createElement('option');
                        option.value = user.id;
                        option.textContent = `${user.name} (${user.email})`;
                        userIdSelect.appendChild(option);
                    });
                }
            } catch (err) {
                console.error('Error loading users:', err);
            }
        }

        // Load users when page loads
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
