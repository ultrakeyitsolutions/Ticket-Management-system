{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Admin Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f6f7fb; }
    .signup-card { width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 0; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="card signup-card">
      <div class="card-body p-4">
        <div class="text-center mb-3">
          <h4 class="mb-1">Create Admin Account</h4>
          <p class="text-muted mb-0">Register as an Admin user (not SuperAdmin)</p>
        </div>
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <form method="post" action="{% url 'superadmin:admin_signup' %}" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username <span class="text-danger">*</span></label>
            <input class="form-control" type="text" name="username" placeholder="admin" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <input class="form-control" type="email" name="email" placeholder="admin@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password <span class="text-danger">*</span></label>
            <input class="form-control" type="password" name="password" placeholder="••••••" autocomplete="new-password" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
            <input class="form-control" type="password" name="confirm_password" placeholder="••••••" autocomplete="new-password" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Create Admin Account</button>
          </div>
        </form>
        <div class="text-center mt-3">
          <a class="small" href="{% url 'superadmin:superadmin_login' %}">Already have an account? Login</a>
          <br>
          <a class="small" href="{% url 'superadmin:superadmin_signup' %}">Create Super Admin</a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
