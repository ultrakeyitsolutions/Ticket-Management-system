{% extends 'superadmin/base.html' %}
{% load static %}

{% block title %}Page Not Found - SuperAdmin{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 60vh;">
                <div class="text-center">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle text-warning" style="font-size: 5rem;"></i>
                    </div>
                    <h1 class="display-4 fw-bold text-muted mb-3">404</h1>
                    <h2 class="h4 text-muted mb-4">Page Not Found</h2>
                    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
                    <div class="d-flex gap-3 justify-content-center">
                        <a href="{% url 'superadmin:superadmin_dashboard' %}" class="btn btn-primary">
                            <i class="bi bi-house me-2"></i>Go to Dashboard
                        </a>
                        <button onclick="history.back()" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Go Back
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
