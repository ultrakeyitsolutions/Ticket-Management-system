     {% load static %}
<aside id="sidebar" class="sidebar">
    <div class="logo-sidebar-brand-image">
    {% if site_settings and site_settings.company_logo %}
        <img class="full-logo light-logo" src="{{ site_settings.company_logo.url }}" alt="">
        <img class="full-logo dark-logo" src="{{ site_settings.company_logo.url }}" alt="">
        <img class="mini-logo" src="{% if site_settings.collapsed_logo and site_settings.company_logo %}{{ site_settings.company_logo.url }}{% else %}{% static 'assets/images/UK-Favicon.png' %}{% endif %}" alt="">
        <span class="mini-logo-text" style="display:none; font-weight:700; font-size:0.9rem;">{{ site_settings.company_name|default:request.user.username }}</span>
    {% else %}
        <!-- Light mode full logo -->
        <img class="full-logo light-logo" src="{% static 'assets/images/logo.jpg' %}" alt="">
        <!-- Dark mode full logo (white version) -->
        <img class="full-logo dark-logo" src="{% static 'assets/images/ultra-logo-white.png' %}" alt="">
        <!-- Mini logo used when sidebar is collapsed -->
        <img class="mini-logo" src="{% static 'assets/images/UK-Favicon.png' %}" alt="">
      
    {% endif %}
</div>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
        <!-- Dashboard -->
        <a href="{% url 'dashboards:agent_dashboard' %}" class="nav-item" data-page="dashboard">
            <i class="bi bi-speedometer2" aria-hidden="true"></i>
            <span class="nav-text">Dashboard</span>
        </a>

        <!-- My Tickets -->
        <a href="{% url 'dashboards:agent_dashboard_page' 'tickets' %}" class="nav-item" data-page="tickets">
            <i class="bi bi-ticket-detailed" aria-hidden="true"></i>
            <span class="nav-text">My Tickets</span>
        </a>

        <!-- Agent Tickets -->
        <a href="{% url 'dashboards:agent_dashboard_page' 'agenttickets' %}" class="nav-item" data-page="agenttickets">
            <i class="bi bi-clipboard-check" aria-hidden="true"></i>
            <span class="nav-text">Agent Ticket</span>
        </a>

        <!-- Reports -->
        <a href="{% url 'dashboards:agent_dashboard_page' 'reports' %}" class="nav-item" data-page="reports">
            <i class="bi bi-bar-chart" aria-hidden="true"></i>
            <span class="nav-text">Reports</span>
        </a>

        <!-- My Performance -->
        <a href="{% url 'dashboards:agent_dashboard_page' 'ratings' %}" class="nav-item" data-page="ratings">
            <i class="bi bi-graph-up-arrow" aria-hidden="true"></i>
            <span class="nav-text">My Performance</span>
        </a>

        <!-- Divider -->
        <div class="sidebar-divider" aria-hidden="true"></div>

        <!-- My Profile -->
        <a href="{% url 'dashboards:agent_dashboard_page' 'profile' %}" class="nav-item" data-page="profile">
            <i class="bi bi-person" aria-hidden="true"></i>
            <span class="nav-text">My Profile</span>
        </a>


        <!-- Settings -->
        <a href="{% url 'dashboards:agent_dashboard_page' 'settings' %}" class="nav-item" data-page="settings">
            <i class="bi bi-gear" aria-hidden="true"></i>
            <span class="nav-text">Settings</span>
        </a>
    </nav>
</aside>
