<!-- New Ticket Modal -->
<div class="modal fade" id="ticketModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create New Ticket</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="ticketForm">
                    <div class="mb-3">
                        <label class="form-label" for="agent_ticket_title">Subject</label>
                        <input type="text" id="agent_ticket_title" name="title" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="agent_ticket_customer">Customer</label>
                            <input type="text" id="agent_ticket_customer" name="customer" class="form-control" placeholder="Enter customer username (optional)">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="agent_ticket_priority">Priority</label>
                            <select id="agent_ticket_priority" name="priority" class="form-select">
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                                <option value="Critical">Critical</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="agent_ticket_description">Description</label>
                        <textarea id="agent_ticket_description" name="description" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Attachments</label>
                        <input type="file" class="form-control" multiple>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="ticketForm" class="btn btn-primary">Create Ticket</button>
            </div>
        </div>
    </div>
</div>

<!-- View Ticket Modal for agent dashboard -->
<div class="modal fade" id="agentTicketViewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Ticket Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <dl class="row mb-0">
                    <dt class="col-sm-3">Ticket ID</dt>
                    <dd class="col-sm-9" id="agent_view_ticket_id">-</dd>

                    <dt class="col-sm-3">Customer</dt>
                    <dd class="col-sm-9" id="agent_view_ticket_customer">-</dd>

                    <dt class="col-sm-3">Subject</dt>
                    <dd class="col-sm-9" id="agent_view_ticket_title">-</dd>

                    <dt class="col-sm-3">Status</dt>
                    <dd class="col-sm-9" id="agent_view_ticket_status">-</dd>

                    <dt class="col-sm-3">Priority</dt>
                    <dd class="col-sm-9" id="agent_view_ticket_priority">-</dd>

                    <dt class="col-sm-3">Created</dt>
                    <dd class="col-sm-9" id="agent_view_ticket_created">-</dd>

                    <dt class="col-sm-3">Description</dt>
                    <dd class="col-sm-9" id="agent_view_ticket_description">-</dd>
                </dl>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="recentFeedbackModal" tabindex="-1" aria-labelledby="recentFeedbackModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="recentFeedbackModalLabel">Feedback Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="text-muted small">Ticket</div>
                        <div class="fw-semibold" id="recentFeedbackTicket">-</div>
                    </div>
                    <div class="text-end">
                        <div class="text-muted small">Rating</div>
                        <div class="fw-semibold" id="recentFeedbackRating">-</div>
                    </div>
                </div>
                <hr class="my-3" />
                <div class="mb-2">
                    <div class="text-muted small">Title</div>
                    <div class="fw-semibold" id="recentFeedbackTitle">-</div>
                </div>
                <div class="mb-2">
                    <div class="text-muted small">Message</div>
                    <div id="recentFeedbackContent" style="white-space: pre-wrap;">-</div>
                </div>
                <div class="mt-3 text-muted small" id="recentFeedbackDate"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
