{% load static %}
<div class="modal fade" id="ticketEditModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Ticket - {{ ticket.ticket_id }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <!-- Post back to admin_ticket_edit so assignment and edits are saved correctly -->
      <form id="ticketEditForm" method="post" action="{% url 'dashboards:admin_ticket_edit' ticket.ticket_id %}">
        <div class="modal-body" style="max-height:60vh; overflow-y:auto;">
          {% csrf_token %}
          {{ form.as_p }}
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
