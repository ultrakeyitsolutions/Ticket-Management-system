<!DOCTYPE html>
<html>
<head>
    <title>Password Setting Test</title>
</head>
<body>
    <h1>Test Password Setting</h1>
    <form id="testForm">
        <label>User ID: <input type="text" id="userId" value="128"></label><br><br>
        <label>Password: <input type="password" id="password" value="test123"></label><br><br>
        <label>Confirm Password: <input type="password" id="confirmPassword" value="test123"></label><br><br>
        <button type="submit">Set Password</button>
    </form>
    
    <div id="result"></div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const csrf = getCookie('csrftoken');
            const url = `/api/users/${userId}/set-password/`;
            
            console.log('Sending request to:', url);
            console.log('CSRF token:', csrf);
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrf || '',
                    },
                    body: JSON.stringify({
                        password: password,
                        confirm_password: confirmPassword
                    }),
                });
                
                const data = await response.json();
                console.log('Response status:', response.status);
                console.log('Response data:', data);
                
                document.getElementById('result').innerHTML = `
                    <h3>Result:</h3>
                    <p>Status: ${response.status}</p>
                    <p>Data: ${JSON.stringify(data, null, 2)}</p>
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <p>${error.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
