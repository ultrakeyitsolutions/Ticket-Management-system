<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'userdashboard/css/styles.css' %}">
</head>
<body class="app-body">
    <div class="container mt-5">
        <h1>Theme Test Page</h1>
        <p>This page tests the user dashboard theme system.</p>
        
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Current Theme Status</h5>
                <p id="theme-status">Checking...</p>
                <button id="clear-storage" class="btn btn-primary">Clear LocalStorage</button>
                <button id="check-theme" class="btn btn-secondary">Check Theme</button>
            </div>
        </div>
    </div>

    <script>
        // Clear localStorage and test theme
        document.getElementById('clear-storage').addEventListener('click', function() {
            localStorage.clear();
            document.getElementById('theme-status').textContent = 'LocalStorage cleared. Page will reload...';
            setTimeout(() => location.reload(), 1000);
        });

        // Check current theme
        document.getElementById('check-theme').addEventListener('click', function() {
            const darkMode = localStorage.getItem('darkMode');
            const theme = localStorage.getItem('theme');
            const hasLightTheme = document.body.classList.contains('light-theme');
            const hasDarkTheme = document.body.classList.contains('dark-theme');
            
            document.getElementById('theme-status').innerHTML = `
                <strong>localStorage:</strong><br>
                darkMode: ${darkMode}<br>
                theme: ${theme}<br><br>
                <strong>Body classes:</strong><br>
                light-theme: ${hasLightTheme}<br>
                dark-theme: ${hasDarkTheme}<br><br>
                <strong>Current theme:</strong> ${hasLightTheme ? 'Light' : hasDarkTheme ? 'Dark' : 'Unknown'}
            `;
        });

        // Apply the same theme logic as the user dashboard
        const updateTheme = (isLight) => {
            if (isLight) {
                document.body.classList.add("light-theme");
                document.body.classList.remove("dark-theme");
            } else {
                document.body.classList.add("dark-theme");
                document.body.classList.remove("light-theme");
            }
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        };

        const applySavedTheme = () => {
            // Clear any conflicting darkMode setting from other parts of the app
            localStorage.removeItem('darkMode');
            
            const savedTheme = localStorage.getItem('theme');

            if (savedTheme === 'light') {
                updateTheme(true);
            } else if (savedTheme === 'dark') {
                updateTheme(false);
            } else {
                // Default to light theme when no preference is saved
                updateTheme(true);
            }
        };

        // Apply theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            applySavedTheme();
            document.getElementById('check-theme').click();
        });
    </script>
</body>
</html>
