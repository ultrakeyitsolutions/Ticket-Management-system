<!DOCTYPE html>
<html>
<head>
    <title>Test Message Backend Integration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Test Message Backend Integration</h1>
        <p>This page tests the message sending functionality connected to the backend.</p>
        
        <button class="btn btn-primary" onclick="openMessageModal()">Open Message Modal</button>
        
        <div class="mt-3">
            <h3>Test Results:</h3>
            <div id="test-results" class="alert alert-info">
                Click the button above to test the message functionality.
            </div>
        </div>
    </div>

    <!-- Hidden CSRF token for testing -->
    <input type="hidden" name="csrfmiddlewaretoken" value="test-token-value">

    <script>
        function openMessageModal() {
            // Create a simple message modal for demo
            const modalHtml = `
                <div class="modal fade show" id="messageModal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
                    <div class="modal-content" style="background: white; padding: 2rem; border-radius: 8px; max-width: 500px; width: 90%;">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0">Send Message</h5>
                            <button type="button" class="btn-close" onclick="closeMessageModal()">&times;</button>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Recipient</label>
                            <select class="form-control mb-2" id="messageRecipient">
                                <option value="">Select a user...</option>
                                <option value="admin">Admin</option>
                                <option value="user">Customer</option>
                                <option value="agent">Other Agent</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" id="messageContent" rows="4" placeholder="Type your message here..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-primary" onclick="sendMessage()">Send Message</button>
                            <button type="button" class="btn btn-secondary" onclick="closeMessageModal()">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
            
            // Add modal to page
            const modalDiv = document.createElement('div');
            modalDiv.innerHTML = modalHtml;
            document.body.appendChild(modalDiv);
        }

        function closeMessageModal() {
            const modal = document.getElementById('messageModal');
            if (modal) {
                modal.remove();
            }
        }

        function sendMessage() {
            const recipient = document.getElementById('messageRecipient').value;
            const content = document.getElementById('messageContent').value;
            
            if (!recipient || !content.trim()) {
                alert('Please select a recipient and enter a message');
                return;
            }
            
            // Update test results
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = `<div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div> Sending message to ${recipient}...`;
            
            // Send message to backend
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || 
                               document.querySelector('input[name="csrfmiddlewaretoken"]')?.value;
            
            if (!csrfToken) {
                resultsDiv.innerHTML = '<div class="alert alert-danger">Security token not found. Please refresh the page and try again.</div>';
                return;
            }
            
            fetch('/dashboard/agent-dashboard/send-message/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({
                    recipient: recipient,
                    message: content
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultsDiv.innerHTML = `<div class="alert alert-success">
                        <strong>Success!</strong> Message sent to ${data.recipient_name || recipient}.<br>
                        Message ID: ${data.message_id}<br>
                        Message: "${content}"
                    </div>`;
                    closeMessageModal();
                    // Clear form
                    document.getElementById('messageRecipient').value = '';
                    document.getElementById('messageContent').value = '';
                } else {
                    resultsDiv.innerHTML = `<div class="alert alert-danger">
                        <strong>Error:</strong> ${data.message}
                    </div>`;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resultsDiv.innerHTML = `<div class="alert alert-danger">
                    <strong>Network Error:</strong> ${error.message}<br>
                    This might be expected if running outside the Django environment.
                </div>`;
            });
        }
    </script>
</body>
</html>
