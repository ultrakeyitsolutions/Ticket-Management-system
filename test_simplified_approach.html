<!DOCTYPE html>
<html>
<head>
    <title>Test Simplified Approach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Test Simplified Approach</h1>
        <p>Testing the completely simplified message functionality with no complex null references.</p>
        
        <!-- Simulate existing forms with CSRF tokens -->
        <form id="agent-account-form" method="post" enctype="multipart/form-data" class="row g-3" style="display: none;">
            <input type="hidden" name="csrfmiddlewaretoken" value="test-csrf-token-simple">
            <input type="hidden" name="username" value="testuser" autocomplete="username">
        </form>
        
        <button class="btn btn-primary" onclick="openMessageModal()">Open Message Modal</button>
        
        <div class="mt-3">
            <h3>Test Results:</h3>
            <div id="test-results" class="alert alert-info">
                Click the button above to test the simplified approach.
            </div>
        </div>
    </div>

    <script>
        function openMessageModal() {
            // Simple modal creation without complex token handling
            const modalHtml = '<div class="modal fade show" id="messageModal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">' +
                '<div class="modal-content" style="background: white; padding: 2rem; border-radius: 8px; max-width: 500px; width: 90%;">' +
                    '<div class="d-flex justify-content-between align-items-center mb-3">' +
                        '<h5 class="mb-0">Send Message</h5>' +
                        '<button type="button" class="btn-close" onclick="closeMessageModal()">&times;</button>' +
                    '</div>' +
                    '<div class="mb-3">' +
                        '<label class="form-label">Recipient</label>' +
                        '<select class="form-control mb-2" id="messageRecipient">' +
                            '<option value="">Select a recipient...</option>' +
                            '<option value="admin">System Administrator</option>' +
                            '<option value="user">Customer Support</option>' +
                            '<option value="agent">Another Agent</option>' +
                        '</select>' +
                    '</div>' +
                    '<div class="mb-3">' +
                        '<label class="form-label">Message</label>' +
                        '<textarea class="form-control" id="messageContent" rows="4" placeholder="Type your message here..."></textarea>' +
                    '</div>' +
                    '<div class="d-flex gap-2">' +
                        '<button type="button" class="btn btn-primary" onclick="sendMessage()">Send Message</button>' +
                        '<button type="button" class="btn btn-secondary" onclick="closeMessageModal()">Cancel</button>' +
                    '</div>' +
                '</div>' +
            '</div>';
            
            // Add modal to page
            const modalDiv = document.createElement('div');
            modalDiv.innerHTML = modalHtml;
            document.body.appendChild(modalDiv);
            
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<div class="alert alert-success">Modal created successfully with simplified approach!</div>';
        }

        function closeMessageModal() {
            const modal = document.getElementById('messageModal');
            if (modal) {
                modal.remove();
            }
        }

        function sendMessage() {
            // Safe element retrieval
            const recipientElement = document.getElementById('messageRecipient');
            const contentElement = document.getElementById('messageContent');
            
            if (!recipientElement || !contentElement) {
                alert('Message form not loaded properly. Please try again.');
                return;
            }
            
            const recipient = recipientElement.value || '';
            const content = contentElement.value || '';
            
            if (!recipient || !content.trim()) {
                alert('Please select a recipient and enter a message');
                return;
            }
            
            // Simple CSRF token retrieval
            let csrfToken = '';
            try {
                const tokenElements = document.getElementsByName('csrfmiddlewaretoken');
                if (tokenElements && tokenElements.length > 0 && tokenElements[0].value) {
                    csrfToken = tokenElements[0].value;
                }
            } catch (e) {
                console.log('CSRF token not available');
            }
            
            // Send message
            const fetchOptions = {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    recipient: recipient,
                    message: content
                })
            };
            
            // Add CSRF token if available
            if (csrfToken) {
                fetchOptions.headers['X-CSRFToken'] = csrfToken;
            }
            
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">Sending...</span></div>';
            
            fetch('/dashboard/agent-dashboard/send-message/', fetchOptions)
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                if (data.success) {
                    resultsDiv.innerHTML = '<div class="alert alert-success"><strong>Success!</strong> Message sent without any JavaScript errors!<br>CSRF Token: ' + csrfToken + '<br>Recipient: ' + recipient + '<br>Message: "' + content + '"</div>';
                    closeMessageModal();
                    // Clear form safely
                    if (recipientElement) recipientElement.value = '';
                    if (contentElement) contentElement.value = '';
                } else {
                    resultsDiv.innerHTML = '<div class="alert alert-warning"><strong>Backend Error:</strong> ' + (data.message || 'Unknown error') + '<br>But no JavaScript errors occurred!</div>';
                }
            })
            .catch(function(error) {
                console.error('Error:', error);
                resultsDiv.innerHTML = '<div class="alert alert-info"><strong>Network Error (Expected in Test)</strong><br>But no JavaScript errors occurred! The simplified approach works.<br>Error: ' + error.message + '</div>';
            });
        }
    </script>
</body>
</html>
