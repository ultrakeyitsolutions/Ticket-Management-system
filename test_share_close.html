<!DOCTYPE html>
<html>
<head>
    <title>Test Share Modal Close Functionality</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Test Share Modal Close Functionality</h1>
        <button class="btn btn-primary" onclick="shareProfile()">Open Share Modal</button>
    </div>

    <script>
        function shareProfile() {
            const profileData = {
                name: 'Test User',
                role: 'Agent',
                email: 'test@example.com',
                phone: '123-456-7890',
                department: 'Support',
                ticketsClosed: 25,
                avgRating: '4.5/5',
                profileUrl: window.location.href
            };
            
            // Create share modal
            const modalHtml = `
                <div class="modal fade show" id="shareModal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
                    <div class="modal-content" style="background: white; padding: 2rem; border-radius: 8px; max-width: 500px; width: 90%;">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0">Share Profile</h5>
                            <button type="button" class="btn-close" onclick="closeShareModal()">&times;</button>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Share via:</label>
                            <div class="d-grid gap-2" style="grid-template-columns: 1fr 1fr;">
                                <button type="button" class="btn btn-outline-primary" onclick="shareViaEmail()">
                                    <i class="bi bi-envelope me-2"></i>Email
                                </button>
                                <button type="button" class="btn btn-outline-success" onclick="shareViaLink()">
                                    <i class="bi bi-link-45deg me-2"></i>Copy Link
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Profile Information:</label>
                            <div class="border rounded p-3 bg-light">
                                <div class="row">
                                    <div class="col-6"><strong>Name:</strong> ${profileData.name}</div>
                                    <div class="col-6"><strong>Role:</strong> ${profileData.role}</div>
                                </div>
                                <div class="row">
                                    <div class="col-6"><strong>Email:</strong> ${profileData.email}</div>
                                    <div class="col-6"><strong>Phone:</strong> ${profileData.phone}</div>
                                </div>
                                <div class="row">
                                    <div class="col-6"><strong>Department:</strong> ${profileData.department}</div>
                                    <div class="col-6"><strong>Tickets Closed:</strong> ${profileData.ticketsClosed}</div>
                                </div>
                                <div class="row">
                                    <div class="col-12"><strong>Average Rating:</strong> ${profileData.avgRating}</div>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-secondary" onclick="closeShareModal()">Close</button>
                        </div>
                    </div>
                </div>
            `;
            
            // Add modal to page
            const modalDiv = document.createElement('div');
            modalDiv.innerHTML = modalHtml;
            document.body.appendChild(modalDiv);
        }

        function closeShareModal() {
            const modal = document.getElementById('shareModal');
            if (modal) {
                modal.remove();
            }
        }

        function shareViaEmail() {
            const profileEmail = 'test@example.com';
            const profileName = 'Test User';
            
            const subject = encodeURIComponent(`Profile: ${profileName}`);
            const body = encodeURIComponent(`Check out my profile: ${window.location.href}

Profile Details:
Name: ${profileName}
Role: Agent
Email: ${profileEmail}
Phone: 123-456-7890
Department: Support
Tickets Closed: 25
Average Rating: 4.5/5

View full profile at: ${window.location.href}`);
            
            window.open(`mailto:${profileEmail}?subject=${subject}&body=${body}`, '_blank');
        }

        function shareViaLink() {
            // Copy to clipboard
            if (navigator.clipboard) {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('Profile link copied to clipboard!');
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                    // Fallback: select text
                    const textArea = document.createElement('textarea');
                    textArea.value = window.location.href;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    alert('Profile link copied to clipboard!');
                });
            } else {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = window.location.href;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('Profile link copied to clipboard!');
            }
        }
    </script>
</body>
</html>
