<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
</head>
<body>
    <div class='container mt-5'>
        <div class='row'>
            <div class='col-md-8 mx-auto'>
                <div class='card'>
                    <div class='card-header bg-primary text-white'>
                        <h4>Complete Your Payment</h4>
                    </div>
                    <div class='card-body'>
                        <div class='alert alert-info'>
                            <h6>Selected Plan</h6>
                            <p><strong>Plan:</strong> {{ plan_name|title }}</p>
                            <p><strong>Price:</strong> ₹{{ price }}/month</p>
                        </div>
                        
                        <form method='post'>
                            {% csrf_token %}
                            <input type='hidden' name='plan' value='{{ plan_name }}'>
                            <input type='hidden' name='price' value='{{ price }}'>
                            
                            <div class='mb-3'>
                                <label class='form-label'>Payment Method</label>
                                <select class='form-control' name='payment_method'>
                                    <option value='card'>Credit/Debit Card</option>
                                    <option value='bank'>Bank Transfer</option>
                                    <option value='upi'>UPI</option>
                                </select>
                            </div>
                            
                            <div class='mb-3'>
                                <div class='form-check'>
                                    <input class='form-check-input' type='checkbox' id='terms' required>
                                    <label class='form-check-label' for='terms'>
                                        I agree to the Terms and Conditions
                                    </label>
                                </div>
                            </div>
                            
                            <div class='d-flex justify-content-between'>
                                <a href='/dashboard/admin-dashboard/' class='btn btn-secondary'>Back</a>
                                <button type='submit' class='btn btn-success'>Process Payment ₹{{ price }}</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
