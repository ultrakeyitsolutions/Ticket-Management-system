<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background:#f3f4f6; font-family:'Segoe UI', sans-serif; }
    .auth-container { max-width:420px; margin:80px auto; background:#fff; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); padding:30px; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h4 class="text-center mb-3">Sign Up</h4>
    {% if messages %}
      <div class="mb-3">
        {% for message in messages %}
          <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %} py-2 px-3 mb-2" role="alert">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="mb-2">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" required>
      </div>
      <div class="mb-2">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" required>
      </div>
      <div class="mb-2">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" name="confirm_password" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Create Account</button>
    </form>
    <p class="text-center text-small mt-3">Already have an account? <a href="{% url 'login' %}">Login</a></p>
  </div>
</body>
</html>
